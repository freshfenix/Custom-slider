<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.15.4/css/all.css">
  <title>Title</title>
</head>

<body>

  <main>
    <div id="carousel" class="carousel">
      <div id="slides-container" class="slides">
        <div class="slide active">1</div>
        <div class="slide">2</div>
        <div class="slide">3</div>
      </div>
      <div id="indicators-container" class="indicators">
        <div class="indicator active" data-slide-to="0"></div>
        <div class="indicator" data-slide-to="1"></div>
        <div class="indicator" data-slide-to="2"></div>
      </div>
      <div id="controls-container" class="controls">
        <button id="pause-btn" class="control-btn"></button>
        <button id="prev-btn" class="control-btn"><i class="fas fa-angle-left"></i></button>
        <button id="next-btn" class="control-btn"><i class="fas fa-angle-right"></i></button>
      </div>
    </div>
  </main>
  <script src="main.js" type="module"></script>

</body>

</html>
